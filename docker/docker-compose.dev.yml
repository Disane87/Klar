# Dev environment — Postgres 16 only.
# Apps run locally via: pnpm dev
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: haushaltsbuch
      POSTGRES_PASSWORD: haushaltsbuch
      POSTGRES_DB: haushaltsbuch
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haushaltsbuch -d haushaltsbuch"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_dev_data:
    driver: local
