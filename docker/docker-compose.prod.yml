networks:
  backend:
    internal: true

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-klar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-klar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klar} -d ${POSTGRES_DB:-klar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/disane87/klar:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-klar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-klar}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      PORT: 3000
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      # OIDC (optional)
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-sso}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile}
      OIDC_REQUIRED_GROUP: ${OIDC_REQUIRED_GROUP:-}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-}
      OIDC_AUTO_JOIN_HOUSEHOLD_ID: ${OIDC_AUTO_JOIN_HOUSEHOLD_ID:-}
