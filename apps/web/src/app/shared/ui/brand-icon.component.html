@if (iconKey(); as ik) {
  <iconify-icon
    [icon]="ik"
    [width]="size()"
    [height]="size()"
    [style.color]="effectiveColor()"
    class="block" />
} @else {
  <klar-icon name="tag" [size]="size()"
             [style.color]="effectiveColor()"
             class="block text-(--text-muted)" />
}
