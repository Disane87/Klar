<div class="wrapper">
  @if (label()) {
    <label [for]="inputId" hlmLabel>{{ label() }}</label>
  }
  <div class="field" [class.has-error]="error()">
    @if (iconName()) {
      <klar-icon [name]="iconName()!" [size]="14" class="icon" />
    }
    @if (prefix()) {
      <span class="affix">{{ prefix() }}</span>
    }
    <input
      hlmInput
      class="border-0 focus-visible:ring-0 bg-transparent h-full rounded-none px-0"
      [id]="inputId"
      [type]="type()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled"
      [value]="value"
      (input)="onInput($event)"
      (change)="onInput($event)"
      (blur)="onTouched()"
    />
    @if (suffix()) {
      <span class="affix suffix">{{ suffix() }}</span>
    }
  </div>
  @if (error()) {
    <span hlmError>{{ error() }}</span>
  } @else if (hint()) {
    <span class="hint">{{ hint() }}</span>
  }
</div>
