<button
  [class]="hostClass()"
  [disabled]="disabled() || loading()"
  [attr.type]="type()"
  (click)="clicked.emit()"
>
  @if (loading()) {
    <svg [attr.width]="iconSize()" [attr.height]="iconSize()" viewBox="0 0 24 24" class="spinner">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.5" fill="none" opacity="0.25"/>
      <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>
  } @else if (iconName()) {
    <klar-icon [name]="iconName()!" [size]="iconSize()" [stroke]="1.75" />
  }
  @if (label()) {
    <span>{{ label() }}</span>
  }
  <ng-content />
</button>
