@if (variant() === 'diamond') {
  <svg [attr.width]="size()" [attr.height]="size()" viewBox="0 0 32 32" fill="none">
    <rect x="6" y="6" width="20" height="20"
          transform="rotate(45 16 16)"
          [attr.stroke]="color()" stroke-width="2"/>
    <rect x="13" y="13" width="6" height="6"
          transform="rotate(45 16 16)"
          [attr.fill]="color()"/>
  </svg>
} @else {
  <svg [attr.width]="size()" [attr.height]="size()" viewBox="0 0 32 32" fill="none">
    <rect x="6" y="5" width="2.4" height="22" [attr.fill]="color()"/>
    <rect x="14.5" y="3.5" width="2.4" height="16"
          transform="rotate(34 15.7 11.5)" [attr.fill]="color()"/>
    <rect x="14.5" y="12.5" width="2.4" height="16"
          transform="rotate(-34 15.7 20.5)" [attr.fill]="color()"/>
    <rect x="3" y="15.6" width="26" height="0.8" [attr.fill]="color()" opacity="0.55"/>
  </svg>
}
