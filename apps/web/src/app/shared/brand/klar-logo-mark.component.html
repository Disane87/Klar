@if (variant() === 'diamond') {
  <svg [attr.width]="size()" [attr.height]="size()" viewBox="0 0 32 32" fill="none">
    <rect x="6" y="6" width="20" height="20"
          transform="rotate(45 16 16)"
          [attr.stroke]="color()" stroke-width="2"/>
    <rect x="13" y="13" width="6" height="6"
          transform="rotate(45 16 16)"
          [attr.fill]="color()"/>
  </svg>
} @else {
  <!-- Variante D: Weiß→Lavendel-Gradient, keine Mittellinie -->
  <svg [attr.width]="size()" [attr.height]="size()" viewBox="0 0 32 32" fill="none">
    <defs>
      <linearGradient [id]="gradId()" x1="7" y1="5" x2="26" y2="27" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   [attr.stop-color]="gradStart()"/>
        <stop offset="100%" [attr.stop-color]="gradEnd()"/>
      </linearGradient>
    </defs>
    <rect x="7"    y="5"   width="2.2" height="22" rx="1.1" [attr.fill]="fill()"/>
    <rect x="14.6" y="3.8" width="2.2" height="14" rx="1.1" transform="rotate(32 15.7 10.8)" [attr.fill]="fill()"/>
    <rect x="14.6" y="14"  width="2.2" height="14" rx="1.1" transform="rotate(-32 15.7 21)"  [attr.fill]="fill()"/>
  </svg>
}
