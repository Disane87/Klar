<svg
  [attr.width]="size()"
  [attr.height]="size()"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  [attr.stroke-width]="stroke()"
  stroke-linecap="round"
  stroke-linejoin="round"
  [attr.aria-label]="name()"
>
  @switch (name()) {
    @case ('fixkosten') {
      <path d="M5 4v16"/>
      <path d="M9 8h8"/>
      <path d="M14 5l3 3-3 3"/>
      <path d="M9 16h8"/>
      <path d="M14 13l3 3-3 3"/>
    }
    @case ('ueberschuss') {
      <path d="M4 20h16"/>
      <path d="M12 17V6"/>
      <path d="M7 11l5-5 5 5"/>
    }
    @case ('planspiel') {
      <path d="M4 20h16" stroke-dasharray="2 2.5"/>
      <path d="M12 17V6" stroke-dasharray="2 2.5"/>
      <path d="M7 11l5-5 5 5" stroke-dasharray="2 2.5"/>
    }
    @case ('haushalt') {
      <circle cx="9" cy="8" r="3"/>
      <path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
      <circle cx="16" cy="6" r="2.5"/>
      <path d="M14 12c3.5.4 6 2.9 6 6.5"/>
    }
    @case ('wiederkehrend') {
      <path d="M20 12a8 8 0 1 1-2.34-5.66"/>
      <path d="M20 4v4h-4"/>
      <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
    }
    @case ('dashboard') {
      <rect x="3" y="3" width="7" height="9" rx="1"/>
      <rect x="14" y="3" width="7" height="5" rx="1"/>
      <rect x="14" y="12" width="7" height="9" rx="1"/>
      <rect x="3" y="16" width="7" height="5" rx="1"/>
    }
    @case ('trending') {
      <path d="M3 17l6-6 4 4 8-8"/>
      <path d="M14 7h7v7"/>
    }
    @case ('folder') {
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    }
    @case ('receipt') {
      <path d="M5 21V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v17l-3-2-3 2-3-2-3 2-2-2z"/>
      <path d="M8 8h8"/>
      <path d="M8 12h8"/>
      <path d="M8 16h5"/>
    }
    @case ('settings') {
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
    }
    @case ('key') {
      <circle cx="7.5" cy="15.5" r="3.5"/>
      <path d="M10 13l9-9"/>
      <path d="M16 7l3 3"/>
    }
    @case ('shield') {
      <path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/>
    }
    @case ('plus') {
      <path d="M12 5v14M5 12h14"/>
    }
    @case ('pencil') {
      <path d="M17 3l4 4-12 12H5v-4z"/>
      <path d="M14 6l4 4"/>
    }
    @case ('trash') {
      <path d="M3 6h18"/>
      <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
      <path d="M5 6l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/>
      <path d="M10 11v6M14 11v6"/>
    }
    @case ('chevron-right') {
      <path d="M9 6l6 6-6 6"/>
    }
    @case ('chevron-down') {
      <path d="M6 9l6 6 6-6"/>
    }
    @case ('chevron-left') {
      <path d="M15 6l-6 6 6 6"/>
    }
    @case ('check') {
      <path d="M4 12l5 5L20 6"/>
    }
    @case ('x') {
      <path d="M6 6l12 12M18 6L6 18"/>
    }
    @case ('close') {
      <path d="M6 6l12 12M18 6L6 18"/>
    }
    @case ('copy') {
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    }
    @case ('alert') {
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 8v5"/>
      <path d="M12 16.5v.01"/>
    }
    @case ('wallet') {
      <path d="M3 7a2 2 0 0 1 2-2h12v4"/>
      <path d="M3 7v10a2 2 0 0 0 2 2h15V9H5a2 2 0 0 1-2-2z"/>
      <circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/>
    }
    @case ('card') {
      <rect x="2" y="6" width="20" height="13" rx="2"/>
      <path d="M2 10h20"/>
      <path d="M6 15h3"/>
    }
    @case ('arrow-up-right') {
      <path d="M7 17L17 7"/>
      <path d="M8 7h9v9"/>
    }
    @case ('arrow-down-right') {
      <path d="M7 7l10 10"/>
      <path d="M17 8v9H8"/>
    }
    @case ('refresh') {
      <path d="M21 12a9 9 0 0 1-15.5 6.3"/>
      <path d="M3 12a9 9 0 0 1 15.5-6.3"/>
      <path d="M21 4v5h-5"/>
      <path d="M3 20v-5h5"/>
    }
    @case ('calendar') {
      <rect x="3" y="5" width="18" height="16" rx="2"/>
      <path d="M3 10h18"/>
      <path d="M8 3v4M16 3v4"/>
    }
    @case ('tag') {
      <path d="M3 12V5a2 2 0 0 1 2-2h7l9 9-9 9z"/>
      <circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/>
    }
    @case ('search') {
      <circle cx="11" cy="11" r="7"/>
      <path d="M21 21l-4.5-4.5"/>
    }
    @case ('filter') {
      <path d="M3 5h18l-7 9v6l-4-2v-4z"/>
    }
    @case ('eye') {
      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
      <circle cx="12" cy="12" r="3"/>
    }
    @case ('lock') {
      <rect x="4" y="11" width="16" height="10" rx="1.5"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    }
    @case ('menu') {
      <path d="M3 6h18M3 12h18M3 18h18"/>
    }
    @case ('logout') {
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <path d="M16 17l5-5-5-5"/>
      <path d="M21 12H9"/>
    }
    @default {
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 8v5"/>
      <path d="M12 16.5v.01"/>
    }
  }
</svg>
