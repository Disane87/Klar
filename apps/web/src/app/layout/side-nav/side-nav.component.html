<aside class="sidenav">
  <div class="wordmark-wrap">
    <klar-wordmark [size]="22" />
  </div>

  <div class="section-label klar-label">Übersicht</div>
  @for (item of mainItems; track item.id) {
    <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
      <klar-icon [name]="item.icon" [size]="14" [stroke]="1.6" />
      <span>{{ item.label }}</span>
    </a>
  }

  <div class="section-label klar-label section-sys">System</div>
  @for (item of sysItems; track item.id) {
    <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
      <klar-icon [name]="item.icon" [size]="14" [stroke]="1.6" />
      <span>{{ item.label }}</span>
    </a>
  }

  @if (householdStore.activeHousehold(); as active) {
    <a routerLink="/app/haushalt" class="household" title="Haushalt verwalten">
      <div class="hh-avatar">
        {{ active.household.name.slice(0, 2).toUpperCase() }}
      </div>
      <div class="hh-info">
        <div class="hh-name">{{ active.household.name }}</div>
        <div class="klar-label-2 hh-role">{{ active.role }}</div>
      </div>
    </a>
  }
</aside>
