<aside
  class="w-(--sidebar-w) shrink-0 flex flex-col h-full overflow-y-auto border-r border-(--line)"
  style="background: linear-gradient(180deg, oklch(from var(--accent) l c h / 0.10) 0%, transparent 220px), var(--bg-side);"
  role="navigation"
  aria-label="Hauptnavigation"
>
  <!-- Brand -->
  <div class="px-5 pt-5 pb-5 flex items-center gap-3">
    <div
      class="size-[26px] rounded-md flex items-center justify-center font-medium text-[15px] shrink-0"
      style="
        background: linear-gradient(135deg, var(--accent), oklch(from var(--accent) calc(l - 0.10) c calc(h + 30)));
        color: oklch(0.16 0.012 35);
        font-family: var(--font-display);
        box-shadow: 0 4px 12px -2px oklch(from var(--accent) l c h / 0.5);
      "
    >K</div>
    <div class="flex flex-col leading-tight min-w-0">
      <span class="font-medium text-[18px] tracking-[-0.01em]" style="font-family: var(--font-display);">Klar</span>
      <span class="text-[11px] text-(--fg-2) tracking-[0.04em] mono truncate">v0.9.4 · self-host</span>
    </div>
  </div>

  <!-- Household switcher — only shown when the user is in 2+ households -->
  @if (showSwitcher()) {
    <div class="px-3 pb-2">
      <klar-select
        [options]="householdOptions()"
        [value]="activeHouseholdId()"
        (valueChange)="onHouseholdChange($event)"
        ariaLabel="Haushalt wechseln"
      />
    </div>
  }

  <!-- Main group -->
  <div class="px-3 pt-2">
    <div class="px-3 py-2 text-[10px] uppercase tracking-[0.14em] text-(--fg-3) font-medium">Haushalt</div>
    @for (item of mainItems(); track item.id) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item relative flex items-center gap-3 py-2 px-3 rounded-md text-[13px] text-(--fg-1) no-underline transition-colors duration-[var(--dur-1)] hover:text-(--fg)"
        [style.--nav-tone]="item.tone"
      >
        <klar-icon [name]="item.icon" [size]="16" class="ico shrink-0" />
        <span>{{ item.label }}</span>
      </a>
    }
  </div>

  <!-- System group -->
  <div class="px-3 pt-3 mt-auto">
    <div class="px-3 py-2 text-[10px] uppercase tracking-[0.14em] text-(--fg-3) font-medium">System</div>
    @for (item of sysItems(); track item.id) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item relative flex items-center gap-3 py-2 px-3 rounded-md text-[13px] text-(--fg-1) no-underline transition-colors duration-[var(--dur-1)] hover:text-(--fg)"
        [style.--nav-tone]="item.tone"
      >
        <klar-icon [name]="item.icon" [size]="16" class="ico shrink-0" />
        <span>{{ item.label }}</span>
      </a>
    }
  </div>

  <!-- Foot — user identity + logout -->
  <div class="border-t border-(--line-soft) mt-3 px-3 py-3 flex items-center gap-3 text-[12px]">
    <klar-header-user />
  </div>
</aside>
