<header class="w-full border-b border-(--border) px-5 flex items-center justify-between shrink-0 h-[var(--header-height)]">

  <!-- Left: title + month as subtitle -->
  <div class="flex flex-col justify-center gap-0.5">
    <span class="text-[15px] font-medium tracking-[-0.01em] text-(--text) leading-none">
      {{ title() }}
    </span>
    @if (subtitle()) {
      <span class="text-[11px] text-(--text-muted) leading-none">{{ subtitle() }}</span>
    } @else {
      <span class="text-[10px] uppercase tracking-widest font-medium text-(--text-muted) leading-none">
        {{ monthChip() }}
      </span>
    }
  </div>

  <!-- Right: stats + actions + user -->
  <div class="flex items-center h-9 gap-2">

    <!-- Stat badges -->
    @for (stat of stats(); track $index) {
      <div class="flex items-center gap-2 h-7 px-3
                  rounded border border-(--border) bg-(--surface)">
        <span class="text-[9px] uppercase tracking-widest text-(--text-muted) leading-none">
          {{ stat.label }}
        </span>
        <span class="text-[13px] font-mono tabular-nums leading-none"
              [ngClass]="statColor(stat.tone)">
          {{ stat.valueCents | klarMoney }}
        </span>
      </div>
    }

    <!-- Action buttons -->
    @if (showPlanspiel()) {
      <klar-button tone="ghost" size="sm" icon="planspiel" (click)="planspielClick.emit()">
        Planspiel
      </klar-button>
    }
    @if (showExport()) {
      <klar-button tone="outline" size="sm" icon="download" (click)="exportClick.emit()">
        PDF
      </klar-button>
    }
    @if (showAdd()) {
      <klar-button tone="primary" size="sm" icon="plus" (click)="addClick.emit()">
        {{ addLabel() }}
      </klar-button>
    }

    <klar-header-user />
  </div>
</header>
