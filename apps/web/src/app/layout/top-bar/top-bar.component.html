<header class="w-full border-b border-(--border) px-5 flex items-center justify-between shrink-0 h-[var(--header-height)]">
  <div class="flex items-center h-9">
    <span class="text-[15px] font-medium tracking-[-0.01em] flex items-center">{{ title() }}</span>
    @if (subtitle()) {
      <span class="text-[11px] text-(--text-muted) flex items-center ml-3">{{ subtitle() }}</span>
    }
  </div>

  <div class="flex items-center h-9 gap-3">
    <!-- Stats as cards -->
    @for (stat of stats(); track $index) {
      <div class="bg-(--surface) rounded border border-(--border) px-3 py-2 flex items-center">
        <span class="text-[9px] uppercase tracking-wider text-(--text-muted) mr-3">
          {{ stat.label }}
        </span>
        <span class="text-[14px] font-mono tabular-nums" [ngClass]="statColor(stat.tone)">
          {{ stat.valueCents | klarMoney }}
        </span>
      </div>
    }
    <klar-month-chip [label]="monthChip()" />
    @if (showPlanspiel()) {
      <button hlmBtn variant="ghost" size="sm" type="button" (click)="planspielClick.emit()">
        <klar-icon name="planspiel" [size]="14" />
        Planspiel
      </button>
    }
    @if (showAdd()) {
      <button hlmBtn variant="default" size="sm" type="button" (click)="addClick.emit()">
        <klar-icon name="plus" [size]="14" />
        {{ addLabel() }}
      </button>
    }
    @if (showExport()) {
      <button hlmBtn variant="outline" size="sm" type="button" (click)="exportClick.emit()">
        <klar-icon name="download" [size]="14" />
        PDF
      </button>
    }
    <klar-header-user />
  </div>
</header>
