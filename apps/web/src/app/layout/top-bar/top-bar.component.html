<header class="topbar">
  <div class="title-area">
    <span class="title">{{ title() }}</span>
    @if (subtitle()) {
      <span class="subtitle klar-label">{{ subtitle() }}</span>
    }
  </div>

  <div class="actions">
    <div class="month-chip">
      <klar-icon name="calendar" [size]="12" class="chip-icon" />
      <span class="klar-mono">{{ monthChip() }}</span>
    </div>
    @if (showPlanspiel()) {
      <button hlmBtn variant="ghost" size="sm" type="button" (click)="planspielClick.emit()">
        <klar-icon name="planspiel" [size]="14" />
        Planspiel
      </button>
    }
    @if (showAdd()) {
      <button hlmBtn variant="default" size="sm" type="button" (click)="addClick.emit()">
        <klar-icon name="plus" [size]="14" />
        {{ addLabel() }}
      </button>
    }
  </div>
</header>
