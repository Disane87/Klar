<div class="flex h-dvh overflow-hidden bg-(--bg)">
  <!-- Desktop sidebar — hidden on mobile -->
  <klar-side-nav class="hidden md:flex" />

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <klar-update-banner />
    @if (pageHeader.title()) {
      <!-- Desktop top bar -->
      <klar-top-bar
        class="hidden md:flex"
        [title]="pageHeader.title()"
        [subtitle]="pageHeader.subtitle() ?? ''"
        [monthChip]="pageHeader.chipLabel() ?? monthChip()"
        [showPlanspiel]="pageHeader.showPlanspiel()"
        [showAdd]="pageHeader.showAdd()"
        [showExport]="pageHeader.showExport()"
        [addLabel]="pageHeader.addLabel()"
        [stats]="pageHeader.stats()"
        (addClick)="pageHeader.onAdd()?.()"
        (planspielClick)="pageHeader.onPlanspiel()?.()"
        (exportClick)="pageHeader.onExport()?.()"
      />
      <!-- Mobile header — title + month chip + user, hidden on desktop -->
      <header class="flex h-12 px-4 border-b border-(--border) bg-(--surface) items-center justify-between shrink-0 md:hidden">
        <span class="text-sm font-medium tracking-[-0.01em]">{{ pageHeader.title() }}</span>
        <div class="flex items-center gap-2">
          <klar-month-chip [label]="pageHeader.chipLabel() ?? monthChip()" />
          <klar-header-user />
        </div>
      </header>
    }
    <router-outlet />
  </div>
</div>

<!-- Mobile bottom nav — hidden on desktop -->
<nav class="fixed bottom-0 left-0 right-0 pb-(--safe-bottom) border-t border-(--border) bg-(--surface) flex items-center justify-around z-[100] md:hidden">
  @for (tab of tabs; track tab.id) {
    <a [routerLink]="tab.route" routerLinkActive="active"
       class="flex flex-col items-center justify-center gap-1 py-3 px-2 text-(--text-muted) [&.active]:text-(--color-accent) no-underline min-w-14 transition-colors duration-150">
      @if (tab.primary) {
        <div class="size-10 rounded-full bg-(--surface-2) border border-(--border) flex items-center justify-center">
          <klar-icon [name]="tab.icon" [size]="20" [stroke]="2" class="text-(--color-accent)" />
        </div>
      } @else {
        <klar-icon [name]="tab.icon" [size]="20" [stroke]="1.5" class="[&.active]:stroke-2" />
      }
      <span class="text-[10px] tracking-[0.05em] font-medium">{{ tab.label }}</span>
    </a>
  }
</nav>

<!-- Global toast container -->
<klar-toast-container />
