<div class="dialog-body">
  <div class="flex flex-col gap-2">
    <p class="text-[10px] uppercase tracking-widest text-muted-foreground">Inhalte</p>

    <label class="flex min-h-11 cursor-pointer items-center gap-2">
      <hlm-checkbox
        [checked]="includeTransactions()"
        (checkedChange)="includeTransactions.set($event === true)" />
      <span class="text-sm">Buchungen</span>
    </label>

    <label class="flex min-h-11 cursor-pointer items-center gap-2">
      <hlm-checkbox
        [checked]="includeRecurring()"
        (checkedChange)="includeRecurring.set($event === true)" />
      <span class="text-sm">Fixkosten</span>
    </label>
  </div>

  <div class="flex flex-col gap-2">
    <p class="text-[10px] uppercase tracking-widest text-muted-foreground">Zeitraum (optional)</p>
    <div class="flex flex-wrap gap-3">
      <div class="flex flex-col gap-1">
        <label hlmLabel for="export-start">Von</label>
        <klar-date-input [inputId]="'export-start'" [(value)]="startDate" />
      </div>
      <div class="flex flex-col gap-1">
        <label hlmLabel for="export-end">Bis</label>
        <klar-date-input [inputId]="'export-end'" [(value)]="endDate" />
      </div>
    </div>
  </div>

  <div class="dialog-actions">
    <klar-button tone="primary" [loading]="exporting()" (click)="export()">
      Exportieren
    </klar-button>
    <klar-button tone="ghost" (click)="dialog.close()">Abbrechen</klar-button>
  </div>
</div>
