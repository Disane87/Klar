<div class="flex flex-col gap-4">
  <p class="text-[10px] uppercase tracking-widest text-muted-foreground">Daten importieren</p>

  @if (fileError()) {
    <klar-error-bar [message]="fileError()" />
  }

  <input #fileInput type="file" accept=".json" class="sr-only" (change)="onFileSelected($event)" />

  <klar-button tone="outline" class="self-start"
               [loading]="analyzing()" (click)="fileInput.click()">
    JSON-Datei wählen
  </klar-button>

  <p class="text-xs text-muted-foreground">
    Klar-Export-Datei (.json). Kategorien und Projekte werden automatisch zugeordnet.
  </p>
</div>
