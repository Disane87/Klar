<klar-async-state
  [loading]="store.loading()"
  [error]="store.error()"
  [empty]="store.isEmpty()"
  errorMessage="Fehler beim Laden der Buchungen."
  emptyMessage="Noch keine Buchungen für diesen Monat"
  emptyCtaLabel="Buchung anlegen"
  (retry)="store.reload()"
  (cta)="openCreate()"
>
  <ng-template klarLoading>
    <div class="p-(--s-6) flex flex-col gap-(--s-4)">
      <klar-skeleton height="120px" />
      <klar-skeleton height="320px" />
    </div>
  </ng-template>

  <div class="p-(--s-6) pb-(--s-3) flex flex-col gap-(--s-5) md:flex-1 md:min-h-0">
    <klar-hero
      eyebrow="Cashflow"
      [title]="monthLabel()"
      [sub]="householdLabel()"
    >
      <klar-icon heroEyebrowIcon name="wallet" [size]="11" />
    </klar-hero>

    <div class="grid grid-cols-3 gap-2 md:gap-(--s-4)">
      <klar-tile
        label="Einnahmen"
        tone="success"
        valueClass="text-(--success)"
        [value]="(store.totalIncomeCents() | klarMoney) ?? ''"
      >
        <ng-container slot="sub">
          <klar-icon name="trending-up" [size]="12" />
          {{ incomeCount() }} {{ incomeCount() === 1 ? 'Buchung' : 'Buchungen' }}
        </ng-container>
      </klar-tile>

      <klar-tile
        label="Ausgaben"
        [value]="(store.totalExpenseCents() | klarMoney) ?? ''"
      >
        <ng-container slot="sub">
          <klar-icon name="hash" [size]="12" />
          @if (expenseRatio() !== null) {
            {{ expenseRating() }} · {{ expenseRatio() }} % der Einnahmen
          } @else {
            keine Einnahmen erfasst
          }
        </ng-container>
      </klar-tile>

      <klar-tile
        [label]="store.nettoCents() >= 0 ? 'Überschuss' : 'Defizit'"
        [tone]="store.nettoCents() >= 0 ? 'success' : 'danger'"
        [valueClass]="store.nettoCents() >= 0 ? 'text-(--success)' : 'text-(--danger)'"
        [value]="(store.nettoCents() | klarMoney) ?? ''"
      >
        <ng-container slot="sub">
          @if (surplusRatio() !== null) {
            ≈ {{ surplusRatio() }} % · {{ surplusRating() }}
          } @else {
            ––
          }
        </ng-container>
      </klar-tile>
    </div>

    <klar-transactions-table
      [transactions]="store.sortedItems()"
      (rowClick)="openEdit($event)"
    />
  </div>
</klar-async-state>
