<div class="page">

  <!-- Month nav -->
  <klar-month-picker
    class="month-nav"
    [month]="store.currentMonth()"
    (monthChange)="store.setMonth($event)" />

  <!-- Loading -->
  @if (store.loading()) {
    <div class="stat-strip">
      <div class="stat">
        <klar-skeleton height="10px" width="80px"/>
        <klar-skeleton class="sk-gap-8" height="26px" width="70%"/>
      </div>
      <div class="stat-rule"></div>
      <div class="stat">
        <klar-skeleton height="10px" width="80px"/>
        <klar-skeleton class="sk-gap-8" height="26px" width="70%"/>
      </div>
      <div class="stat-rule"></div>
      <div class="stat">
        <klar-skeleton height="10px" width="80px"/>
        <klar-skeleton class="sk-gap-8" height="26px" width="70%"/>
      </div>
    </div>

    <klar-skeleton-rows [count]="6" class="px-5 pt-3" />
  }

  <!-- Error -->
  @else if (store.error()) {
    <klar-error-bar message="Fehler beim Laden der Buchungen." (retry)="store.reload()" />
  }

  <!-- Empty -->
  @else if (store.isEmpty()) {
    <klar-toolbar label="Übersicht" />
    <klar-summary-strip [incomeCents]="0" [expenseCents]="0" [balanceCents]="0" />

    <klar-empty-state message="Noch keine Buchungen für diesen Monat" ctaLabel="Buchung anlegen" (ctaClick)="openCreate()" />
  }

  <!-- Data -->
  @else {
    <klar-toolbar label="Übersicht" />

    <klar-summary-strip
      [incomeCents]="store.totalIncomeCents()"
      [expenseCents]="store.totalExpenseCents()"
      [balanceCents]="store.nettoCents()" />

    <!-- Grouped transaction list -->
    <div class="flex-1 overflow-y-auto pb-16">
      <klar-list>
        @for (group of groups(); track group.categoryId ?? 'none') {
          <klar-list-group
            [label]="group.categoryName"
            [headerDotColor]="group.categoryColor"
            [headerValue]="group.totalCents | klarMoney"
            [headerValueClass]="group.totalCents | klarMoneyClass"
            [collapsible]="true"
            [collapsed]="isCollapsed(groupKey(group))"
            (headerAction)="toggleGroup(groupKey(group))">
            @for (tx of group.items; track tx.id) {
              <klar-list-row [navigable]="true" (rowClick)="openEdit(tx)">
                <app-brand-icon
                  [name]="primaryLabel(tx)"
                  [size]="22"
                  [icon]="tx.icon ?? group.categoryIcon ?? null"
                  [color]="tx.color ?? group.categoryColor ?? null"
                  class="shrink-0"
                />
                <div class="flex-1 min-w-0">
                  <p class="text-[13px] font-medium truncate" [class.opacity-60]="tx.isPlanned">
                    {{ primaryLabel(tx) }}
                  </p>
                  <p class="text-[11px] text-(--text-muted) mt-0.5 truncate">
                    {{ formatSublabel(tx) }}
                  </p>
                </div>
                <span class="font-mono tabular-nums text-[13px] shrink-0"
                      [ngClass]="tx.amountCents | klarMoneyClass">
                  {{ tx.amountCents | klarMoney }}
                </span>
              </klar-list-row>
            }
          </klar-list-group>
        }
      </klar-list>
    </div>
  }

</div>
