<div class="flex flex-col items-center justify-center flex-1 gap-6 px-6 pb-16">
  <div class="flex items-center justify-center w-20 h-20 rounded-2xl bg-[color-mix(in_oklab,var(--color-accent)_10%,var(--surface-2))] border border-[color-mix(in_oklab,var(--color-accent)_25%,transparent)]">
    <klar-icon name="tresor" [size]="36" [stroke]="1.25" class="text-accent" />
  </div>

  <div class="text-center max-w-xs">
    <h2 class="text-lg font-semibold text-(--text) mb-1">Ersparnisse &amp; Rücklagen</h2>
    <p class="text-sm text-(--text-muted) leading-relaxed">
      Lege Ersparnisse und Rücklagen an, verfolge dein Sparkapital und definiere Sparziele — alles an einem Ort.
    </p>
  </div>

  <div class="px-4 py-2 rounded-md bg-(--surface-2) border border-(--border)">
    <span class="text-[11px] uppercase tracking-widest text-(--text-muted) font-medium">Coming Soon</span>
  </div>
</div>
