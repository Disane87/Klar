<div class="flex flex-col gap-4">

  <div class="flex flex-col gap-1.5">
    <label hlmLabel for="rcd-name">Name</label>
    <input id="rcd-name" hlmInput type="text"
           placeholder="z.B. Miete, Netflix..."
           [value]="name()"
           (input)="name.set($any($event.target).value)" />
  </div>

  <div class="flex flex-col gap-1.5">
    <label hlmLabel for="rcd-amount">{{ amountLabel() }}</label>
    <klar-money-input
      [inputId]="'rcd-amount'"
      placeholder="0,00"
      [(amountCents)]="amountCents"
    />
  </div>

  <div class="flex flex-col gap-1.5">
    <label hlmLabel>Kategorie</label>
    <klar-combobox
      [items]="cats.active()"
      [value]="categoryId()"
      (valueChange)="categoryId.set($event)"
      [idOf]="catId"
      [displayWith]="catName"
      placeholder="Kategorie wählen…"
      searchPlaceholder="Kategorie suchen…"
      [addLabel]="addCategoryLabel"
      ariaLabel="Kategorie wählen"
      (addNew)="onAddCategory($event)" />
  </div>

  <div class="flex flex-col gap-1.5">
    <label hlmLabel for="rcd-freq">Frequenz</label>
    <select id="rcd-freq" hlmSelect class="scheme-dark"
            (change)="frequency.set($any($event.target).value)">
      @for (opt of freqOptions; track opt.value) {
        <option [value]="opt.value" [selected]="opt.value === frequency()">{{ opt.label }}</option>
      }
    </select>
  </div>

  @if (isWeekly()) {
    <div class="flex flex-col gap-1.5">
      <label hlmLabel for="rcd-weekday">Buchungstag</label>
      <select id="rcd-weekday" hlmSelect class="scheme-dark"
              (change)="dayOfWeek.set($any($event.target).value)">
        @for (opt of weekdayOptions; track opt.value) {
          <option [value]="opt.value" [selected]="opt.value === dayOfWeek()">{{ opt.label }}</option>
        }
      </select>
    </div>
  } @else {
    <div class="flex flex-col gap-1.5">
      <label hlmLabel for="rcd-day">Buchungstag (1–31)</label>
      <input id="rcd-day" hlmInput class="font-mono tabular-nums" type="number"
             min="1" max="31" placeholder="–"
             [value]="dayOfMonth()"
             (input)="dayOfMonth.set($any($event.target).value)" />
    </div>
  }

  <div class="flex flex-col gap-3 rounded-md border border-(--border) p-3 bg-(--surface-2)/30">
    <p class="text-[10px] uppercase tracking-wider font-semibold text-(--text-muted)">Aussehen</p>

    <div class="flex flex-col gap-1.5">
      <label hlmLabel>Icon</label>
      <klar-icon-picker [value]="icon()" (valueChange)="icon.set($event)" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label hlmLabel>Farbe</label>
      <klar-color-picker [value]="color()" (valueChange)="color.set($event)" />
    </div>
  </div>

  @if (err()) {
    <p class="text-[12px] text-(--color-expense)">{{ err() }}</p>
  }

  <div class="flex justify-end gap-2 pt-2 border-t border-(--border)">
    <klar-button tone="ghost" size="sm" (click)="cancel()">Abbrechen</klar-button>
    <klar-button tone="primary" size="sm"
                 [disabled]="!isValid()" [loading]="saving()" (click)="save()">
      Erstellen
    </klar-button>
  </div>
</div>
