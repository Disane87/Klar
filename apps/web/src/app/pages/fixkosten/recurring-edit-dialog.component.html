<div class="flex flex-col gap-4">

  <div class="flex flex-col gap-1.5">
    <label hlmLabel for="red-name">Name</label>
    <input id="red-name" hlmInput type="text"
           [placeholder]="item().name"
           [value]="name()"
           (input)="name.set($any($event.target).value)" />
  </div>

  <div class="flex flex-col gap-1.5">
    <label hlmLabel for="red-amount">{{ amountLabel() }}</label>
    <klar-money-input
      [inputId]="'red-amount'"
      placeholder="0,00"
      [(amountCents)]="amountCents"
    />
  </div>

  <div class="flex flex-col gap-1.5">
    <label hlmLabel>Kategorie</label>
    <klar-combobox
      [items]="cats.active()"
      [value]="categoryId()"
      (valueChange)="categoryId.set($event)"
      [idOf]="catId"
      [displayWith]="catName"
      placeholder="Kategorie wählen…"
      searchPlaceholder="Kategorie suchen…"
      [addLabel]="addCategoryLabel"
      ariaLabel="Kategorie wählen"
      (addNew)="onAddCategory($event)" />
  </div>

  <div class="flex flex-col gap-1.5">
    <label hlmLabel for="red-freq">Frequenz</label>
    <klar-select
      [options]="freqOptions"
      [value]="frequency()"
      (valueChange)="frequency.set($any($event))"
      ariaLabel="Frequenz"
    />
  </div>

  @if (isWeekly()) {
    <div class="flex flex-col gap-1.5">
      <label hlmLabel for="red-weekday">Buchungstag</label>
      <klar-select
        [options]="weekdayOptions"
        [value]="dayOfWeek()"
        (valueChange)="dayOfWeek.set($event)"
        ariaLabel="Wochentag"
      />
    </div>
  } @else {
    <div class="flex flex-col gap-1.5">
      <label hlmLabel for="red-day">Buchungstag (1–31)</label>
      <input id="red-day" hlmInput class="font-mono tabular-nums" type="number"
             min="1" max="31" placeholder="–"
             [value]="dayOfMonth()"
             (input)="dayOfMonth.set($any($event.target).value)" />
    </div>
  }

  <div class="flex flex-col gap-3 rounded-md border border-(--border) p-3 bg-(--surface-2)/30">
    <p class="text-[10px] uppercase tracking-wider font-semibold text-(--text-muted)">Aussehen</p>

    <div class="flex flex-col gap-1.5">
      <label hlmLabel>Icon</label>
      <klar-icon-picker [value]="icon()" (valueChange)="icon.set($event)" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label hlmLabel>Farbe</label>
      <klar-color-picker [value]="color()" (valueChange)="color.set($event)" />
    </div>
  </div>

  @if (err()) {
    <p class="text-[12px] text-expense">{{ err() }}</p>
  }

  <klar-dialog-footer
    class="pt-2 border-t border-(--border)"
    confirmLabel="Speichern"
    [confirmDisabled]="!isValid()"
    [confirmLoading]="saving()"
    [autoCloseOnCancel]="false"
    (cancel)="cancel()"
    (confirm)="save()"
  >
    <klar-button start tone="danger" size="sm" [loading]="saving()" (click)="remove()">
      Löschen
    </klar-button>
  </klar-dialog-footer>
</div>
