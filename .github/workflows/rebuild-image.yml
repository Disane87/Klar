name: Rebuild Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to rebuild (e.g. v1.2.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push ${{ inputs.tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Derive version
        id: ver
        run: echo "value=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.value }}
          tags: |
            ghcr.io/disane87/klar:${{ steps.ver.outputs.value }}
            ghcr.io/disane87/klar:${{ inputs.tag }}
            ghcr.io/disane87/klar:latest
          cache-from: type=gha,scope=klar
          cache-to: type=gha,mode=max,scope=klar
